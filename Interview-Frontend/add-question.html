<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="section">
    <h1>Add Question</h1>

    <button onclick="window.location.href='dashboard.html'">
        Back to Dashboard
    </button>

    <hr>

    <input type="text" id="questionText" placeholder="Question"onblur="checkQuestion()">
    <p id="questionError"
       style="color:red;">
    </p>
    <input type="text" id="topic" placeholder="Topic">
    <input type="text" id="difficulty" placeholder="Difficulty">
    <input type="text" id="expectedAnswer" placeholder="Expected Answer">
    <button onclick="addQuestion()">
        Add Question
    </button>
    <p id="formMessage"></p>
</div>
    <script src="js/add-question.js"></script>

</body>
</html>
